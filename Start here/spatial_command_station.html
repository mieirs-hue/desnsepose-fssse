<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Green Spatial Target System</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #020604;
            color: #8cffb0;
            font-family: "Courier New", Courier, monospace;
            padding: 14px;
        }
        #status-bar {
            width: 100%;
            max-width: 1380px;
            margin: 0 auto 12px;
            padding: 8px 10px;
            border: 1px solid #176137;
            color: #ffb36b;
            text-align: center;
            background: rgba(0, 20, 10, 0.85);
        }
        #app-shell {
            width: 100%;
            max-width: 1380px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: stretch;
        }
        #display-stack {
            flex: 1;
            min-width: 0;
        }
        #grid-container {
            position: relative;
            width: 100%;
            min-height: 520px;
            border: 1px solid #1b7d42;
            background:
                linear-gradient(rgba(7, 36, 18, 0.85), rgba(1, 8, 4, 0.95)),
                radial-gradient(circle at 50% 50%, rgba(65, 255, 140, 0.08), rgba(0, 0, 0, 0.94) 72%);
            overflow: hidden;
            transform-origin: center;
        }
        #grid-floor {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(80, 255, 140, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(80, 255, 140, 0.08) 1px, transparent 1px);
            background-size: 5% 10%;
            pointer-events: none;
        }
        .signal-field {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            transition: width 0.18s ease, height 0.18s ease, opacity 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
        }
        .node-label {
            position: absolute;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 6px currentColor;
            pointer-events: none;
            z-index: 3;
        }
        .node-marker {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px currentColor;
            background: currentColor;
            z-index: 3;
        }
        #target-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
        }
        #control-panel {
            width: 340px;
            border: 1px solid #1b7d42;
            background: linear-gradient(180deg, rgba(0, 24, 12, 0.96), rgba(1, 9, 4, 0.98));
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .panel-title {
            font-size: 14px;
            letter-spacing: 0.08em;
            color: #c9ffd7;
            border-bottom: 1px solid #176137;
            padding-bottom: 5px;
        }
        .control-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
        }
        .control-row input[type="range"] {
            width: 100%;
            accent-color: #41ff8c;
        }
        .control-value {
            color: #9fe9ff;
            font-size: 12px;
        }
        .button-row, .mini-btn-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }
        .view-btn, .mini-btn {
            border: 1px solid #1b7d42;
            background: #062313;
            color: #bfffd1;
            padding: 8px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        .view-btn.active {
            background: #0d3a20;
            border-color: #80ffb0;
            box-shadow: 0 0 8px rgba(80, 255, 140, 0.25);
        }
        #system-setup,
        #target-telemetry,
        #calibration-readout,
        #baseline-readout {
            white-space: pre-wrap;
            font-size: 12px;
            line-height: 1.42;
            padding: 8px;
            min-height: 112px;
        }
        #system-setup {
            color: #9fe9ff;
            border: 1px dashed #176137;
            background: rgba(0, 12, 6, 0.82);
        }
        #target-telemetry {
            color: #ffd8c6;
            border: 1px solid #7a3b26;
            background: rgba(24, 8, 4, 0.82);
        }
        #calibration-readout {
            color: #dafde7;
            border: 1px dashed #21745b;
            background: rgba(0, 16, 12, 0.82);
            min-height: 138px;
        }
        #baseline-readout {
            color: #f5efba;
            border: 1px dashed #7d6c2a;
            background: rgba(22, 18, 3, 0.84);
            min-height: 132px;
        }
        .view-topside #grid-container {
            transform: perspective(900px) rotateX(0deg) rotateZ(0deg);
        }
        .view-firstperson #grid-container {
            transform: perspective(1000px) rotateX(58deg) rotateZ(-2deg) scale(1.03);
        }
        .view-outside #grid-container {
            transform: perspective(1200px) rotateX(32deg) rotateZ(12deg) scale(0.97);
        }
        @media (max-width: 1080px) {
            #app-shell {
                flex-direction: column;
            }
            #control-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body class="view-topside">
    <div id="status-bar">Connecting...</div>
    <div id="app-shell">
        <div id="display-stack">
            <div id="grid-container" style="border: 12px solid rgba(220, 38, 38, 0.25);">
                <div id="grid-floor"></div>
                 <div style="position: absolute; top: 10px; left: 10px; padding: 10px; background: rgba(0,0,0,0.5); color: #0f0; font-family: monospace;">
                    MATRIX OVERHEAD STATUS: ACTIVE
                </div>
            </div>
        </div>
        <aside id="control-panel">
            <div class="panel-title">SYSTEM CONTROLS</div>
            <div id="sliders-container"></div>
        </aside>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const statusBar = document.getElementById('status-bar');
        const gridContainer = document.getElementById('grid-container');
        const controlPanel = document.getElementById('control-panel');
        const slidersContainer = document.getElementById('sliders-container');

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, gridContainer.clientWidth / gridContainer.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(gridContainer.clientWidth, gridContainer.clientHeight);
        gridContainer.appendChild(renderer.domElement);

        // Room dimensions
        const roomWidth = 20;
        const roomDepth = 10;
        const roomHeight = 10;

        // Grid helper
        const gridHelper = new THREE.GridHelper(Math.max(roomWidth, roomDepth), 10);
        scene.add(gridHelper);

        // Target
        const targetGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        const targetMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x222222 });
        const target = new THREE.Mesh(targetGeometry, targetMaterial);
        const TARGET_HEIGHT_FEET = 3.5;
        target.position.set(0, TARGET_HEIGHT_FEET, 0); // Start at center, at target height
        scene.add(target);

        const targetLight = new THREE.PointLight(0xffffff, 1, 20);
        targetLight.position.copy(target.position);
        scene.add(targetLight);

        // Ambient light
        scene.add(new THREE.AmbientLight(0x404040, 0.5));

        // Nodes
        const nodes = {
          north: { name: "Gilligan Orange North", pos: [0.0, 9.0, -5.0], color: 0xf97316, baseRadius: 3.0, mesh: null, sphere: null },
          south: { name: "Gadget Yellow South",   pos: [0.0, 9.0, 5.0],  color: 0xeab308, baseRadius: 3.0, mesh: null, sphere: null },
          east:  { name: "Kingsman Red East",      pos: [10.0, 9.0, 0.0], color: 0xef4444, baseRadius: 3.0, mesh: null, sphere: null },
          west:  { name: "Matrix Green West",      pos: [-10.0, 9.0, 0.0], color: 0x22c55e, baseRadius: 3.0, mesh: null, sphere: null }
        };

        Object.values(nodes).forEach(node => {
            const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const material = new THREE.MeshBasicMaterial({ color: node.color });
            node.mesh = new THREE.Mesh(geometry, material);
            node.mesh.position.set(node.pos[0], node.pos[1], node.pos[2]);
            scene.add(node.mesh);

            const sphereGeo = new THREE.SphereGeometry(node.baseRadius, 32, 32);
            const sphereMat = new THREE.MeshBasicMaterial({ color: node.color, transparent: true, opacity: 0.2, wireframe: true });
            node.sphere = new THREE.Mesh(sphereGeo, sphereMat);
            node.sphere.position.set(node.pos[0], node.pos[1], node.pos[2]);
            scene.add(node.sphere);
        });

        camera.position.set(0, 15, 15);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);

            Object.keys(nodes).forEach(key => {
                const node = nodes[key];
                const boostSlider = document.getElementById(`boost-${key}-slider`);
                if (boostSlider) {
                    const scale = 1.0 + (parseFloat(boostSlider.value));
                    node.sphere.scale.set(scale, scale, scale);
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        // WebSocket connection
        function connectWebSocket() {
            const wsUrl = `ws://${window.location.hostname || '127.0.0.1'}:8765`;
            statusBar.textContent = `Connecting to ${wsUrl}...`;
            const socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusBar.textContent = 'LIVE FEED: Connection established.';
            };

            socket.onmessage = (event) => {
                const message = JSON.parse(event.data);

                if (message.type === 'target_update' && message.data) {
                    const { x, y, status } = message.data;
                    
                    if (status === 'LOCKED') {
                        // Backend X is Three.js X
                        // Backend Y is Three.js Z (depth)
                        // Three.js Y is height, which is constant
                        target.position.x = x;
                        target.position.z = y;
                        targetLight.position.copy(target.position);

                        target.visible = true;
                        targetLight.visible = true;
                        targetMaterial.color.set(0x41ff8c); // Green for lock
                        targetMaterial.emissive.set(0x113322);

                    } else { // LOST or other status
                        target.visible = false;
                        targetLight.visible = false;
                    }
                } else if (message.type === 'motion_event' && message.data) {
                    const { node_id, rssi } = message.data;
                    const nodeKey = Object.keys(nodes).find(k => nodes[k].name.toLowerCase().includes(node_id.toLowerCase()));
                    
                    if (nodeKey && nodes[nodeKey]) {
                        const node = nodes[nodeKey];
                        // Simple visualization: pulse opacity based on RSSI
                        const opacity = Math.max(0.1, Math.min(0.8, 1 - (Math.abs(rssi) - 35) / 60));
                        node.sphere.material.opacity = opacity;

                        // Reset opacity after a short delay
                        setTimeout(() => {
                           if (node.sphere.material.opacity === opacity) {
                               node.sphere.material.opacity = 0.2;
                           }
                        }, 300);
                    }
                }
            };

            socket.onclose = () => {
                statusBar.textContent = 'Connection closed. Reconnecting in 3 seconds...';
                setTimeout(connectWebSocket, 3000);
            };
        }

        // Sliders
        const sliders = `
            ${Object.keys(nodes).map(key => `
                <div class="control-row">
                    <label for="boost-${key}-slider">${nodes[key].name} Multiplier</label>
                    <input id="boost-${key}-slider" type="range" min="0.1" max="5" step="0.1" value="1">
                </div>
            `).join('')}
        `;
        slidersContainer.innerHTML = sliders;

        connectWebSocket();
    </script>
</body>
</html>
