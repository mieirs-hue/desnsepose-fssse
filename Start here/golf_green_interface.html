<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Green Spatial Target System</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            padding: 12px;
            overflow-x: hidden;
        }
        #status-bar {
            width: 100%;
            max-width: 1380px;
            margin: 0 auto 10px;
            padding: 7px 10px;
            border: 1px solid #154f28;
            background: #031006;
            color: #ffae42;
            letter-spacing: 0.04em;
            font-size: 13px;
        }
        #main-layout {
            width: 100%;
            max-width: 1380px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: stretch;
        }
        #view-area {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #view-switcher {
            width: 100%;
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .view-btn {
            border: 1px solid #1d8f45;
            background: #04150a;
            color: #9dffb8;
            font-family: inherit;
            padding: 8px 14px;
            cursor: pointer;
        }
        .view-btn.active {
            background: #0d4721;
            color: #e4ffee;
            box-shadow: 0 0 12px rgba(0, 255, 100, 0.25);
        }
        #grid-wrapper {
            position: relative;
            width: min(100%, 980px);
        }
        #grid-container {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 1;
            border: 1px solid #00ff41;
            overflow: hidden;
            transform-origin: center center;
            transition: transform 0.35s ease, box-shadow 0.25s ease;
            background:
                linear-gradient(rgba(0, 255, 65, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.06) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, rgba(0, 255, 65, 0.06), rgba(0, 0, 0, 0.95) 72%),
                #000;
            background-size: 10% 10%, 10% 10%, auto, auto;
        }
        #grid-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--occ-x, 50%) var(--occ-y, 50%), rgba(255, 30, 30, 0.30), rgba(255, 30, 30, 0.07) 46%, rgba(0, 0, 0, 0) 72%);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }
        #grid-container.occupied {
            box-shadow: 0 0 18px rgba(255, 45, 45, 0.35), inset 0 0 28px rgba(255, 40, 40, 0.15);
        }
        #grid-container.occupied::before {
            animation: floor-alert 0.95s ease-in-out infinite;
        }
        #grid-container.view-top { transform: perspective(900px) rotateX(0deg) rotateZ(0deg); }
        #grid-container.view-first { transform: perspective(900px) rotateX(56deg) rotateZ(-2deg) scale(1.02); }
        #grid-container.view-iso { transform: perspective(1200px) rotateX(38deg) rotateZ(10deg) scale(0.97); }
        .signal-aura {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            z-index: 1;
            transition: width 0.18s ease, height 0.18s ease, opacity 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
        }
        .node-label {
            position: absolute;
            transform: translate(-50%, -140%);
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 8px currentColor;
            z-index: 4;
        }
        .node-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px currentColor;
            z-index: 4;
        }
        #target-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .reticle-pulse { animation: reticle-pulse 1.15s ease-in-out infinite; }
        .target-name {
            fill: #ff592b;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 13px;
            text-anchor: middle;
        }
        #side-panel {
            width: 340px;
            border: 1px solid #00ff41;
            background: linear-gradient(180deg, rgba(0, 26, 10, 0.96), rgba(0, 8, 4, 0.98));
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sp-section {
            border: 1px solid #104d25;
            padding: 8px;
            background: rgba(0, 0, 0, 0.28);
        }
        .sp-title {
            color: #b1ffca;
            font-size: 13px;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }
        .sp-stat {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 3px 0;
            font-size: 12px;
        }
        .sp-stat span {
            color: #ffd7c7;
            text-align: right;
        }
        .board-row {
            display: grid;
            grid-template-columns: 14px 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 4px 0;
        }
        .board-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #223;
        }
        .board-name {
            font-size: 12px;
            font-weight: bold;
        }
        .board-detail {
            font-size: 11px;
            color: #c0ffd6;
        }
        .board-rssi {
            font-size: 12px;
        }
        .sp-slider-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .sp-slider-row input {
            width: 100%;
            accent-color: #00ff41;
        }
        .mini-btn-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }
        .mini-btn {
            border: 1px solid #1d8f45;
            background: #031209;
            color: #c8ffdc;
            font-family: inherit;
            padding: 7px 8px;
            text-align: left;
            cursor: pointer;
        }
        #calibration-readout {
            white-space: pre-wrap;
            font-size: 12px;
            line-height: 1.4;
            color: #d8fff4;
            min-height: 64px;
        }
        @keyframes reticle-pulse {
            0%, 100% { opacity: 1; stroke-width: 2; }
            50% { opacity: 0.35; stroke-width: 3.6; }
        }
        @keyframes floor-alert {
            0%, 100% { opacity: 0.24; }
            50% { opacity: 0.58; }
        }
        @media (max-width: 1060px) {
            #main-layout { flex-direction: column; }
            #side-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="status-bar">Connecting...</div>
    <div id="main-layout">
        <div id="view-area">
            <div id="view-switcher">
                <button id="btn-top" class="view-btn active">TOP</button>
                <button id="btn-first" class="view-btn">JESSE POV</button>
                <button id="btn-iso" class="view-btn">ISO</button>
            </div>
            <div id="grid-wrapper">
                <div id="grid-container" class="view-top"></div>
            </div>
        </div>

        <div id="side-panel">
            <div class="sp-section">
                <div class="sp-title">BOARD TELEMETRY</div>
                <div class="board-row">
                    <div class="board-indicator" id="ind-A"></div>
                    <div>
                        <div class="board-name" style="color:#00FFFF">ESP32-A</div>
                        <div class="board-detail" id="detail-A">Waiting...</div>
                    </div>
                    <div class="board-rssi" id="rssi-A" style="color:#00FFFF">—</div>
                </div>
                <div class="board-row">
                    <div class="board-indicator" id="ind-B"></div>
                    <div>
                        <div class="board-name" style="color:#FFFF00">ESP32-B</div>
                        <div class="board-detail" id="detail-B">Waiting...</div>
                    </div>
                    <div class="board-rssi" id="rssi-B" style="color:#FFFF00">—</div>
                </div>
            </div>

            <div class="sp-section">
                <div class="sp-title">TARGET - JESSE</div>
                <div class="sp-stat"><div>Position X</div><span id="sp-x">—</span></div>
                <div class="sp-stat"><div>Position Y</div><span id="sp-y">—</span></div>
                <div class="sp-stat"><div>Signal Est A</div><span id="sp-dA">—</span></div>
                <div class="sp-stat"><div>Signal Est B</div><span id="sp-dB">—</span></div>
                <div class="sp-stat"><div>Confidence</div><span id="sp-confidence">—</span></div>
                <div class="sp-stat"><div>Motion</div><span id="sp-motion">—</span></div>
                <div class="sp-stat"><div>Mode</div><span id="sp-mode">—</span></div>
            </div>

            <div class="sp-section">
                <div class="sp-title">TRACK CONTROLS</div>
                <div class="sp-slider-row">
                    <label>Frequency strength <span id="lbl-freq">10 Hz</span></label>
                    <input type="range" id="sl-freq" min="1" max="20" value="10" step="1">
                </div>
                <div class="sp-slider-row">
                    <label>Sensitivity <span id="lbl-sens">42%</span></label>
                    <input type="range" id="sl-sens" min="10" max="100" value="42" step="1">
                </div>
                <div class="sp-slider-row">
                    <label>Outer perimeter <span id="lbl-outer">20 ft</span></label>
                    <input type="range" id="sl-outer" min="10" max="20" value="20" step="1">
                </div>
                <div class="sp-slider-row">
                    <label>Motion accuracy <span id="lbl-acc">72%</span></label>
                    <input type="range" id="sl-acc" min="10" max="100" value="72" step="1">
                </div>
            </div>

            <div class="sp-section">
                <div class="sp-title">SYSTEM</div>
                <div class="sp-stat"><div>Room</div><span id="sp-room">—</span></div>
                <div class="sp-stat"><div>Boards active</div><span id="sp-boards">0/2</span></div>
                <div class="sp-stat"><div>WS host</div><span id="sp-ws">—</span></div>
                <div class="sp-stat"><div>View</div><span id="sp-view">TOP</span></div>
            </div>

            <div class="sp-section">
                <div class="sp-title">CALIBRATION CAPTURE</div>
                <div class="mini-btn-grid">
                    <button class="mini-btn" data-capture="front-left">Capture Front-left Edge</button>
                    <button class="mini-btn" data-capture="center">Capture Center</button>
                    <button class="mini-btn" data-capture="back-right">Capture Back-right Edge</button>
                </div>
                <div id="calibration-readout">No calibration captures yet.</div>
            </div>
        </div>
    </div>

    <script>
        const statusBar = document.getElementById('status-bar');
        const gridContainer = document.getElementById('grid-container');

        const btnTop = document.getElementById('btn-top');
        const btnFirst = document.getElementById('btn-first');
        const btnIso = document.getElementById('btn-iso');

        const detailA = document.getElementById('detail-A');
        const detailB = document.getElementById('detail-B');
        const rssiAEl = document.getElementById('rssi-A');
        const rssiBEl = document.getElementById('rssi-B');
        const indA = document.getElementById('ind-A');
        const indB = document.getElementById('ind-B');

        const spX = document.getElementById('sp-x');
        const spY = document.getElementById('sp-y');
        const spDA = document.getElementById('sp-dA');
        const spDB = document.getElementById('sp-dB');
        const spConfidence = document.getElementById('sp-confidence');
        const spMotion = document.getElementById('sp-motion');
        const spMode = document.getElementById('sp-mode');
        const spRoom = document.getElementById('sp-room');
        const spBoards = document.getElementById('sp-boards');
        const spWs = document.getElementById('sp-ws');
        const spView = document.getElementById('sp-view');

        const slFreq = document.getElementById('sl-freq');
        const slSens = document.getElementById('sl-sens');
        const slOuter = document.getElementById('sl-outer');
        const slAcc = document.getElementById('sl-acc');
        const lblFreq = document.getElementById('lbl-freq');
        const lblSens = document.getElementById('lbl-sens');
        const lblOuter = document.getElementById('lbl-outer');
        const lblAcc = document.getElementById('lbl-acc');

        const captureButtons = [...document.querySelectorAll('[data-capture]')];
        const calibrationReadout = document.getElementById('calibration-readout');

        let officeWidthFt = 20;
        let officeHeightFt = 10;
        let officeCeilingFt = 10;
        let nodeConfig = {};
        const nodeReadings = {};
        const liveAuras = {};
        const calibrationSnapshots = { 'front-left': null, 'center': null, 'back-right': null };

        let svgEl = null;
        let currentView = 'top';
        let lastTargetNorm = { x: 0.5, y: 0.5 };
        let occupiedUntilMs = 0;
        let lastSignalSnapshot = { A: null, B: null };
        let saveTimer = null;

        const OCCUPIED_HOLD_MS = 3200;
        const controlState = {
            frequencyHz: 10,
            sensitivityPct: 42,
            perimeterFt: 20,
            accuracyPct: 72,
        };

        function getReadingTtlMs() {
            return Math.round(4000 - (controlState.frequencyHz - 1) * 150);
        }

        function getOccupiedStrengthMin() {
            return Math.max(0.08, 0.58 - (controlState.sensitivityPct / 100) * 0.5);
        }

        function getSmoothingAlpha(activeCount) {
            const baseAlpha = activeCount >= 2 ? 0.86 : 0.56;
            const adjustment = ((controlState.accuracyPct / 100) - 0.5) * 0.12;
            return Math.max(0.45, Math.min(0.94, baseAlpha + adjustment));
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function rssiToFeet(rssi) {
            const txPower = -67;
            const n = 3.6;
            return Math.pow(10, (txPower - rssi) / (10 * n)) * 3.28084;
        }

        function projectToFloorDistance(distance3dFt) {
            const vertical = 4;
            if (distance3dFt <= vertical) return 0.25;
            return Math.sqrt((distance3dFt * distance3dFt) - (vertical * vertical));
        }

        function estimateConfidence(strengthA, strengthB) {
            const presence = Math.max(strengthA || 0, strengthB || 0);
            const balance = 1 - Math.min(1, Math.abs((strengthA || 0) - (strengthB || 0)) * 1.15);
            return Math.max(0.08, Math.min(0.97, 0.60 * presence + 0.40 * balance));
        }

        function ensureSignalAura(nodeId, node, color) {
            if (liveAuras[nodeId]) return liveAuras[nodeId];
            const aura = document.createElement('div');
            aura.className = 'signal-aura';
            aura.style.left = `${node.x * 100}%`;
            aura.style.top = `${node.y * 100}%`;
            aura.style.width = '10%';
            aura.style.height = '10%';
            aura.style.backgroundColor = hexToRgba(color, 0.08);
            aura.style.border = `1px solid ${hexToRgba(color, 0.24)}`;
            gridContainer.appendChild(aura);
            liveAuras[nodeId] = aura;
            return aura;
        }

        function updateSignalAura(nodeId, node, radius, opacity, color) {
            const aura = ensureSignalAura(nodeId, node, color);
            aura.style.width = `${2 * radius * 100}%`;
            aura.style.height = `${2 * radius * 100}%`;
            aura.style.opacity = String(opacity);
            aura.style.backgroundColor = hexToRgba(color, 0.12 + opacity * 0.18);
            aura.style.border = `1px solid ${hexToRgba(color, 0.26 + opacity * 0.38)}`;
        }

        function fadeStaleSignalAuras() {
            const now = Date.now();
            for (const [nodeId, aura] of Object.entries(liveAuras)) {
                const reading = nodeReadings[nodeId];
                const freshness = reading ? 1 - Math.min(1, (now - reading.ts) / getReadingTtlMs()) : 0;
                aura.style.opacity = String(Math.max(0.04, freshness * 0.65));
            }
        }

        function setView(view) {
            currentView = view;
            btnTop.classList.toggle('active', view === 'top');
            btnFirst.classList.toggle('active', view === 'first');
            btnIso.classList.toggle('active', view === 'iso');
            gridContainer.className = view === 'top' ? 'view-top' : view === 'first' ? 'view-first' : 'view-iso';
            spView.textContent = view.toUpperCase();
        }

        function scheduleControlSave() {
            if (saveTimer) clearTimeout(saveTimer);
            saveTimer = setTimeout(() => {
                persistControls().catch((err) => console.warn('persist failed', err));
            }, 180);
        }

        function refreshControlLabels() {
            lblFreq.textContent = `${controlState.frequencyHz} Hz`;
            lblSens.textContent = `${controlState.sensitivityPct}%`;
            lblOuter.textContent = `${controlState.perimeterFt} ft`;
            lblAcc.textContent = `${controlState.accuracyPct}%`;
        }

        function renderCalibrationReadout() {
            const labels = [['front-left', 'Front-left'], ['center', 'Center'], ['back-right', 'Back-right']];
            const lines = [];
            for (const [key, label] of labels) {
                const snap = calibrationSnapshots[key];
                if (!snap) {
                    lines.push(`${label}: --`);
                    continue;
                }
                lines.push(`${label}: X ${snap.x.toFixed(1)} | Y ${snap.y.toFixed(1)} | A ${snap.a == null ? '--' : snap.a.toFixed(1)} | B ${snap.b == null ? '--' : snap.b.toFixed(1)} | ${snap.time}`);
            }
            calibrationReadout.textContent = lines.join('\n');
        }

        function updateBoardTelemetry(activeIds) {
            const detailEls = { A: detailA, B: detailB };
            const rssiEls = { A: rssiAEl, B: rssiBEl };
            const inds = { A: indA, B: indB };
            let activeCount = 0;

            for (const id of Object.keys(nodeConfig || {})) {
                const reading = nodeReadings[id];
                const active = activeIds.includes(id);
                if (active) activeCount += 1;
                inds[id].style.background = active ? (nodeConfig[id].color || '#00ff41') : '#223';
                inds[id].style.boxShadow = active ? `0 0 10px ${nodeConfig[id].color || '#00ff41'}` : 'none';
                if (!reading || !active) {
                    detailEls[id].textContent = 'Waiting...';
                    rssiEls[id].textContent = '—';
                } else {
                    const estimate = Math.min(projectToFloorDistance(rssiToFeet(reading.rssi)), controlState.perimeterFt);
                    detailEls[id].textContent = `signal est ${estimate.toFixed(1)} ft`;
                    rssiEls[id].textContent = `${reading.rssi} dBm`;
                }
            }
            spBoards.textContent = `${activeCount}/${Object.keys(nodeConfig || {}).length}`;
        }

        function solveDirectionalTarget(idA, idB, strengthA, strengthB) {
            const nodeA = nodeConfig[idA];
            const nodeB = nodeConfig[idB];
            const diff = strengthB - strengthA;
            const dominance = Math.max(-1, Math.min(1, diff * 2.6));
            const axisT = (dominance + 1) / 2;
            const towardB = 0.08 + axisT * 0.84;
            const x = nodeA.x + (nodeB.x - nodeA.x) * towardB;
            const y = nodeA.y + (nodeB.y - nodeA.y) * towardB;
            return {
                x: Math.max(0.04, Math.min(0.96, x)),
                y: Math.max(0.06, Math.min(0.94, y)),
                dominance,
            };
        }

        function drawTarget(tx, ty, motionDetected) {
            const old = svgEl.querySelector('#target-group');
            if (old) old.remove();

            const widthPx = svgEl.clientWidth || gridContainer.clientWidth;
            const heightPx = svgEl.clientHeight || gridContainer.clientHeight;
            const px = tx * widthPx;
            const py = ty * heightPx;
            const ns = 'http://www.w3.org/2000/svg';
            const g = document.createElementNS(ns, 'g');
            g.id = 'target-group';

            const outer = document.createElementNS(ns, 'circle');
            outer.setAttribute('cx', px);
            outer.setAttribute('cy', py);
            outer.setAttribute('r', '22');
            outer.setAttribute('fill', 'none');
            outer.setAttribute('stroke', '#ff592b');
            outer.setAttribute('stroke-width', '2');
            if (motionDetected) outer.setAttribute('class', 'reticle-pulse');
            g.appendChild(outer);

            const middle = document.createElementNS(ns, 'circle');
            middle.setAttribute('cx', px);
            middle.setAttribute('cy', py);
            middle.setAttribute('r', '13');
            middle.setAttribute('fill', 'none');
            middle.setAttribute('stroke', '#ff592b');
            middle.setAttribute('stroke-width', '1.5');
            g.appendChild(middle);

            const center = document.createElementNS(ns, 'circle');
            center.setAttribute('cx', px);
            center.setAttribute('cy', py);
            center.setAttribute('r', '4');
            center.setAttribute('fill', '#ff592b');
            g.appendChild(center);

            for (const [x1, y1, x2, y2] of [
                [px - 34, py, px - 14, py],
                [px + 14, py, px + 34, py],
                [px, py - 34, px, py - 14],
                [px, py + 14, px, py + 34],
            ]) {
                const seg = document.createElementNS(ns, 'line');
                seg.setAttribute('x1', x1);
                seg.setAttribute('y1', y1);
                seg.setAttribute('x2', x2);
                seg.setAttribute('y2', y2);
                seg.setAttribute('stroke', '#ff592b');
                seg.setAttribute('stroke-width', '2');
                g.appendChild(seg);
            }

            const label = document.createElementNS(ns, 'text');
            label.setAttribute('x', px);
            label.setAttribute('y', py - 30);
            label.setAttribute('class', 'target-name');
            label.textContent = '[ JESSE ]';
            g.appendChild(label);

            svgEl.appendChild(g);
        }

        function updateTarget() {
            const ids = Object.keys(nodeConfig || {});
            if (!svgEl || ids.length === 0) return;

            const now = Date.now();
            const activeIds = ids.filter((id) => {
                const reading = nodeReadings[id];
                return reading && (now - reading.ts) <= getReadingTtlMs();
            });
            updateBoardTelemetry(activeIds);

            let maxStrength = 0;
            for (const id of activeIds) maxStrength = Math.max(maxStrength, nodeReadings[id]?.strength || 0);
            if (activeIds.length > 0 && maxStrength >= getOccupiedStrengthMin()) occupiedUntilMs = now + OCCUPIED_HOLD_MS;
            gridContainer.classList.toggle('occupied', now <= occupiedUntilMs);

            if (activeIds.length === 0) {
                statusBar.textContent = 'No live sensor data. Waiting for boards...';
                statusBar.style.color = '#ff4040';
                const old = svgEl.querySelector('#target-group');
                if (old) old.remove();
                spMode.textContent = 'NO LOCK';
                spMotion.textContent = 'HOLDING';
                return;
            }

            let tx = lastTargetNorm.x;
            let ty = lastTargetNorm.y;
            let estimateA = null;
            let estimateB = null;
            let confidence = 0.12;
            let motionDetected = false;
            let mode = 'SINGLE-ANCHOR';
            let signalDeltaDbm = 0;

            if (activeIds.length >= 2) {
                const [idA, idB] = [...activeIds].sort((a, b) => (nodeReadings[b].strength || 0) - (nodeReadings[a].strength || 0)).slice(0, 2);
                const rssiA = nodeReadings[idA].rssi;
                const rssiB = nodeReadings[idB].rssi;
                const strengthA = nodeReadings[idA].strength || 0;
                const strengthB = nodeReadings[idB].strength || 0;

                estimateA = Math.min(projectToFloorDistance(rssiToFeet(rssiA)), controlState.perimeterFt);
                estimateB = Math.min(projectToFloorDistance(rssiToFeet(rssiB)), controlState.perimeterFt);

                const directional = solveDirectionalTarget(idA, idB, strengthA, strengthB);
                tx = directional.x;
                ty = directional.y;

                confidence = estimateConfidence(strengthA, strengthB);
                signalDeltaDbm = Math.max(
                    lastSignalSnapshot.A == null ? 0 : Math.abs(rssiA - lastSignalSnapshot.A),
                    lastSignalSnapshot.B == null ? 0 : Math.abs(rssiB - lastSignalSnapshot.B)
                );
                lastSignalSnapshot = { A: rssiA, B: rssiB };
                mode = `DUAL-SIGNAL TRACK (${directional.dominance >= 0 ? 'B' : 'A'} BIAS)`;
                statusBar.textContent = `LIVE FEED: Dual-board directional track (${idA}+${idB})`;
                statusBar.style.color = '#00ff41';
            } else {
                const id = activeIds[0];
                const node = nodeConfig[id];
                const reading = nodeReadings[id];
                const estimate = Math.min(projectToFloorDistance(rssiToFeet(reading.rssi)), controlState.perimeterFt);
                if (id === 'A') estimateA = estimate;
                if (id === 'B') estimateB = estimate;
                signalDeltaDbm = Math.abs(reading.rssi - (lastSignalSnapshot[id] ?? reading.rssi));
                lastSignalSnapshot[id] = reading.rssi;
                confidence = Math.max(0.12, (reading.strength || 0) * 0.72);
                tx = node.x;
                ty = node.y;
                mode = `SINGLE-${id}`;
                statusBar.textContent = `LIVE FEED: Single-board anchor hold (${id})`;
                statusBar.style.color = '#ff9d36';
            }

            motionDetected = signalDeltaDbm >= 1.0 || activeIds.length === 1;

            const alpha = getSmoothingAlpha(activeIds.length);
            tx = alpha * tx + (1 - alpha) * lastTargetNorm.x;
            ty = alpha * ty + (1 - alpha) * lastTargetNorm.y;
            lastTargetNorm = { x: tx, y: ty };

            gridContainer.style.setProperty('--occ-x', `${(tx * 100).toFixed(1)}%`);
            gridContainer.style.setProperty('--occ-y', `${(ty * 100).toFixed(1)}%`);

            spX.textContent = `${(tx * officeWidthFt).toFixed(1)} ft`;
            spY.textContent = `${(ty * officeHeightFt).toFixed(1)} ft`;
            spDA.textContent = estimateA == null ? '—' : `${estimateA.toFixed(1)} ft`;
            spDB.textContent = estimateB == null ? '—' : `${estimateB.toFixed(1)} ft`;
            spConfidence.textContent = `${Math.round(confidence * 100)}%`;
            spMotion.textContent = motionDetected ? 'DETECTED' : 'HOLDING';
            spMode.textContent = mode;

            drawTarget(tx, ty, motionDetected);
        }

        function handleMotionEvent(event) {
            const data = JSON.parse(event.data);
            const node = nodeConfig[data.node_id];
            if (!node) return;

            const rssi = data.rssi;
            const strength = Math.max(0, Math.min(1, (rssi + 90) / 50));
            const distanceFactor = 1 - strength;
            const radius = 0.18 + distanceFactor * 1.25;
            const opacity = 0.14 + strength * 0.56;

            updateSignalAura(data.node_id, node, radius, opacity, node.color || '#00ff41');
            nodeReadings[data.node_id] = { rssi, strength, ts: Date.now() };
            updateTarget();
        }

        async function loadRuntimeState() {
            const response = await fetch('/runtime/state', { cache: 'no-store' });
            if (!response.ok) throw new Error(`runtime_state_${response.status}`);
            const state = await response.json();

            if (state.environment) {
                officeWidthFt = state.environment.width_ft || officeWidthFt;
                officeHeightFt = state.environment.height_ft || officeHeightFt;
                officeCeilingFt = state.environment.ceiling_ft || officeCeilingFt;
            }
            if (state.nodes) nodeConfig = state.nodes;
            if (state.ui_controls) {
                controlState.frequencyHz = Number(state.ui_controls.frequency_hz || controlState.frequencyHz);
                controlState.sensitivityPct = Number(state.ui_controls.sensitivity_pct || controlState.sensitivityPct);
                controlState.perimeterFt = Number(state.ui_controls.perimeter_ft || controlState.perimeterFt);
                controlState.accuracyPct = Number(state.ui_controls.accuracy_pct || controlState.accuracyPct);
            }
        }

        async function persistControls() {
            await fetch('/runtime/controls', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    frequency_hz: controlState.frequencyHz,
                    sensitivity_pct: controlState.sensitivityPct,
                    perimeter_ft: controlState.perimeterFt,
                    accuracy_pct: controlState.accuracyPct,
                    view_mode: currentView,
                }),
            });
        }

        function connectWebSocket() {
            const wsUrl = `ws://${window.location.hostname || 'localhost'}:8765`;
            statusBar.textContent = `Connecting to ${wsUrl}...`;
            spWs.textContent = window.location.hostname || 'localhost';
            const socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusBar.textContent = 'LIVE FEED: Connection established.';
                statusBar.style.color = '#00ff41';
            };
            socket.onmessage = handleMotionEvent;
            socket.onclose = () => {
                statusBar.textContent = 'Connection closed. Reconnecting in 3 seconds...';
                statusBar.style.color = '#ff4040';
                setTimeout(connectWebSocket, 3000);
            };
            socket.onerror = () => socket.close();
        }

        async function initialize() {
            try {
                await loadRuntimeState();
                gridContainer.style.aspectRatio = `${officeWidthFt} / ${officeHeightFt}`;
                spRoom.textContent = `${officeWidthFt}×${officeHeightFt}×${officeCeilingFt} ft`;

                slFreq.value = String(controlState.frequencyHz);
                slSens.value = String(controlState.sensitivityPct);
                slOuter.value = String(controlState.perimeterFt);
                slAcc.value = String(controlState.accuracyPct);
                refreshControlLabels();

                svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svgEl.id = 'target-overlay';
                svgEl.setAttribute('width', '100%');
                svgEl.setAttribute('height', '100%');
                gridContainer.appendChild(svgEl);

                for (const [nodeId, nodeInfo] of Object.entries(nodeConfig || {})) {
                    const label = document.createElement('div');
                    label.className = 'node-label';
                    label.textContent = `ESP32-${nodeId}`;
                    label.style.left = `${nodeInfo.x * 100}%`;
                    label.style.top = `${nodeInfo.y * 100}%`;
                    label.style.color = nodeInfo.color || '#00ff41';
                    gridContainer.appendChild(label);

                    const dot = document.createElement('div');
                    dot.className = 'node-dot';
                    dot.style.left = `${nodeInfo.x * 100}%`;
                    dot.style.top = `${nodeInfo.y * 100}%`;
                    dot.style.backgroundColor = nodeInfo.color || '#00ff41';
                    dot.style.color = nodeInfo.color || '#00ff41';
                    gridContainer.appendChild(dot);
                }

                btnTop.addEventListener('click', () => setView('top'));
                btnFirst.addEventListener('click', () => setView('first'));
                btnIso.addEventListener('click', () => setView('iso'));

                captureButtons.forEach((button) => {
                    button.addEventListener('click', () => {
                        calibrationSnapshots[button.dataset.capture] = {
                            x: parseFloat(spX.textContent) || 0,
                            y: parseFloat(spY.textContent) || 0,
                            a: spDA.textContent === '—' ? null : parseFloat(spDA.textContent),
                            b: spDB.textContent === '—' ? null : parseFloat(spDB.textContent),
                            time: new Date().toLocaleTimeString(),
                        };
                        renderCalibrationReadout();
                    });
                });

                slFreq.addEventListener('input', (event) => {
                    controlState.frequencyHz = Number(event.target.value);
                    refreshControlLabels();
                    scheduleControlSave();
                });
                slSens.addEventListener('input', (event) => {
                    controlState.sensitivityPct = Number(event.target.value);
                    refreshControlLabels();
                    scheduleControlSave();
                });
                slOuter.addEventListener('input', (event) => {
                    controlState.perimeterFt = Number(event.target.value);
                    refreshControlLabels();
                    scheduleControlSave();
                });
                slAcc.addEventListener('input', (event) => {
                    controlState.accuracyPct = Number(event.target.value);
                    refreshControlLabels();
                    scheduleControlSave();
                });

                renderCalibrationReadout();
                setView('top');
                connectWebSocket();
                setInterval(updateTarget, 500);
                setInterval(fadeStaleSignalAuras, 250);
            } catch (error) {
                statusBar.textContent = `Initialization failed: ${error.message}`;
                statusBar.style.color = '#ff4040';
            }
        }

        initialize();
    </script>
</body>
</html>
